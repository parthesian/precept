name = "precept-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[[d1_databases]]
binding = "DB"
database_name = "precept"
database_id = "replace-with-d1-id"
migrations_dir = "../../packages/db/migrations"

[[r2_buckets]]
binding = "FRAMES"
bucket_name = "precept-frames"

[[vectorize]]
binding = "VECTORS"
index_name = "precept-shots"
