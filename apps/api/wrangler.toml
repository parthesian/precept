name = "cinegraph-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[[d1_databases]]
binding = "DB"
database_name = "cinegraph"
database_id = "replace-with-d1-id"

[[r2_buckets]]
binding = "FRAMES"
bucket_name = "cinegraph-frames"

[[vectorize]]
binding = "VECTORS"
index_name = "cinegraph-shots"
